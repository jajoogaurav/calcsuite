<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us – CalcSuite Financial Calculators India</title>
  <meta name="description" content="Contact CalcSuite — send feedback, suggestions, or queries about our financial calculators. Reach us via email form or WhatsApp.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://jajoogaurav.github.io/calcsuite/pages/contact.html">
  <link rel="stylesheet" href="../css/styles.css">
  <script async src="https://www.googletagmanager.com/gtag/js?id=GA_MEASUREMENT_ID"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','GA_MEASUREMENT_ID');</script>
</head>
<body>

  <main class="content-page">
    <h1>Contact Us</h1>

    <p>Have questions, feedback, or suggestions? We'd love to hear from you! Fill out the form below or reach out via WhatsApp.</p>

    <!-- WhatsApp Section -->
    <a href="https://wa.me/919929828405?text=Hi%2C%20I%20have%20a%20query%20about%20CalcSuite" target="_blank" rel="noopener"
       style="display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,#25D366,#128C7E);
              padding:16px 24px;border-radius:12px;color:#fff;font-weight:600;font-size:1rem;
              margin-bottom:2rem;transition:all 0.3s ease;text-decoration:none;width:fit-content">
      <span style="font-size:1.5rem">💬</span>
      Chat with us on WhatsApp
    </a>

    <div class="contact-form">
      <form id="contactForm" action="https://formsubmit.co/gauravjajoo1605@gmail.com" method="POST">
        <!-- FormSubmit config -->
        <input type="hidden" name="_subject" value="New CalcSuite Contact Query">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="table">
        <input type="text" name="_honey" style="display:none">

        <div class="form-group">
          <label for="contactName">Full Name</label>
          <input type="text" id="contactName" name="name" placeholder="Enter your name" required>
        </div>
        <div class="form-group">
          <label for="contactEmail">Email Address</label>
          <input type="email" id="contactEmail" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="contactSubject">Subject</label>
          <input type="text" id="contactSubject" name="subject" placeholder="What's this about?">
        </div>
        <div class="form-group">
          <label for="contactMessage">Message</label>
          <textarea id="contactMessage" name="message" placeholder="Write your message here..." required></textarea>
        </div>
        <button type="submit" class="btn btn-primary" id="submitBtn">Send Message →</button>
      </form>
    </div>

    <p style="margin-top:1.5rem;font-size:0.85rem;color:var(--text-muted)">
      Your message will be sent directly to our email. We typically respond within 24 hours.
    </p>
  </main>

  <!-- Floating WhatsApp Button -->
  <a href="https://wa.me/919929828405?text=Hi%2C%20I%20have%20a%20query%20about%20CalcSuite"
     target="_blank" rel="noopener"
     style="position:fixed;bottom:24px;right:24px;width:60px;height:60px;background:#25D366;
            border-radius:50%;display:flex;align-items:center;justify-content:center;
            box-shadow:0 4px 20px rgba(37,211,102,0.4);z-index:999;font-size:1.8rem;
            transition:transform 0.3s ease;text-decoration:none"
     onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
     💬
  </a>

  <script src="../js/shared.js"></script>
</body>
</html>
