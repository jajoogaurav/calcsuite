<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMI Calculator - Automated Test Suite</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Consolas', monospace; background: #0a0e1a; color: #f1f5f9; padding: 2rem; }
    h1 { margin-bottom: 0.5rem; font-size: 1.5rem; }
    .summary { margin: 1rem 0; padding: 1rem; border-radius: 8px; font-size: 1.1rem; font-weight: bold; }
    .summary.pass { background: #064e3b; border: 1px solid #10b981; }
    .summary.fail { background: #7f1d1d; border: 1px solid #ef4444; }
    .test { margin: 0.5rem 0; padding: 0.75rem 1rem; border-radius: 6px; border: 1px solid #2a3352; }
    .test.pass { background: #0f2d1f; border-color: #10b981; }
    .test.fail { background: #2d0f0f; border-color: #ef4444; }
    .test-name { font-weight: bold; margin-bottom: 4px; }
    .test-detail { font-size: 0.85rem; color: #94a3b8; }
    .section { margin: 1.5rem 0 0.75rem; font-size: 1.1rem; color: #818cf8; border-bottom: 1px solid #2a3352; padding-bottom: 4px; }
  </style>
</head>
<body>
  <h1>🧪 EMI Calculator — Automated Test Suite</h1>
  <div id="summary" class="summary">Running tests...</div>
  <div id="results"></div>

  <script>
    // ===== Pure EMI calculation functions (copied from calculator for isolated testing) =====

    function calcEMI(P, annualRate, months) {
      if (P <= 0 || months <= 0) return 0;
      const r = annualRate / 12 / 100;
      if (r === 0) return P / months;
      const factor = Math.pow(1 + r, months);
      return P * r * factor / (factor - 1);
    }

    function formatCurrency(num) {
      if (isNaN(num) || !isFinite(num)) return '₹0';
      return '₹' + Math.round(num).toLocaleString('en-IN');
    }

    function validateInputs(P, rate, tenure) {
      if (isNaN(P) || P <= 0) return 'Invalid input: Loan amount must be greater than 0';
      if (isNaN(rate) || rate < 0) return 'Invalid input: Interest rate cannot be negative';
      if (rate > 100) return 'Invalid input: Interest rate cannot exceed 100%';
      if (isNaN(tenure) || tenure <= 0) return 'Invalid input: Tenure must be greater than 0';
      return null;
    }

    function generateAmortization(P, annualRate, totalMonths, emi) {
      const r = annualRate / 12 / 100;
      let balance = P;
      const rows = [];
      for (let m = 1; m <= totalMonths; m++) {
        const interestPaid = balance * r;
        let principalPaid = emi - interestPaid;
        if (m === totalMonths) principalPaid = balance;
        const closing = Math.max(0, balance - principalPaid);
        rows.push({ month: m, opening: balance, interest: interestPaid, principal: principalPaid, closing });
        balance = closing;
      }
      return rows;
    }

    // ===== Test helpers =====
    let passed = 0, failed = 0;
    const results = document.getElementById('results');

    function assert(name, condition, detail) {
      const div = document.createElement('div');
      div.className = 'test ' + (condition ? 'pass' : 'fail');
      div.innerHTML = `<div class="test-name">${condition ? '✅' : '❌'} ${name}</div><div class="test-detail">${detail}</div>`;
      results.appendChild(div);
      if (condition) passed++;
      else failed++;
    }

    function approx(a, b, tolerance) {
      return Math.abs(a - b) <= tolerance;
    }

    function section(title) {
      const div = document.createElement('div');
      div.className = 'section';
      div.textContent = title;
      results.appendChild(div);
    }

    // ===== USER TEST CASES =====

    // TEST 1: Standard EMI Case
    section('TEST 1: Standard EMI Case (₹10L, 10%, 10yr)');
    {
      const emi = calcEMI(1000000, 10, 120);
      const total = emi * 120;
      const interest = total - 1000000;
      assert('EMI ≈ ₹13,215–₹13,220', emi >= 13215 && emi <= 13220, `EMI = ${formatCurrency(emi)} (${emi.toFixed(2)})`);
      assert('Total payment ≈ ₹15.8L–₹15.9L', total >= 1580000 && total <= 1590000, `Total = ${formatCurrency(total)} (${total.toFixed(2)})`);
      assert('Total interest ≈ ₹5.8L–₹5.9L', interest >= 580000 && interest <= 590000, `Interest = ${formatCurrency(interest)} (${interest.toFixed(2)})`);

      const rows = generateAmortization(1000000, 10, 120, emi);
      assert('Month 1: interest > principal', rows[0].interest > rows[0].principal,
        `Interest=${formatCurrency(rows[0].interest)}, Principal=${formatCurrency(rows[0].principal)}`);
      assert('Last month: principal ≈ full remaining balance', rows[119].closing === 0,
        `Closing balance = ${rows[119].closing.toFixed(4)}`);
    }

    // TEST 2: Early Closure Case
    section('TEST 2: Early Closure (₹10L, 10%, 10yr → 9yr)');
    {
      const origEMI = calcEMI(1000000, 10, 120);
      const earlyEMI = calcEMI(1000000, 10, 108);
      const origTotal = origEMI * 120;
      const earlyTotal = earlyEMI * 108;
      const interestSaved = origTotal - earlyTotal;
      assert('EMI increases with shorter tenure', earlyEMI > origEMI,
        `Original=${formatCurrency(origEMI)}, New=${formatCurrency(earlyEMI)}`);
      assert('Total interest decreases', (earlyTotal - 1000000) < (origTotal - 1000000),
        `Original interest=${formatCurrency(origTotal - 1000000)}, New=${formatCurrency(earlyTotal - 1000000)}`);
      assert('Interest saved ≈ ₹40K–₹70K', interestSaved >= 40000 && interestSaved <= 70000,
        `Saved = ${formatCurrency(interestSaved)} (${interestSaved.toFixed(2)})`);

      const rows = generateAmortization(1000000, 10, 108, earlyEMI);
      assert('Early closure table has 108 rows', rows.length === 108, `Rows = ${rows.length}`);
      assert('Early closure last month balance = 0', rows[107].closing === 0, `Closing = ${rows[107].closing.toFixed(4)}`);
    }

    // TEST 3: Zero Interest Case
    section('TEST 3: Zero Interest (₹5L, 0%, 5yr)');
    {
      const emi = calcEMI(500000, 0, 60);
      assert('EMI = ₹8,333.33', approx(emi, 8333.33, 1), `EMI = ${emi.toFixed(2)}`);
      assert('Total interest = ₹0', approx(emi * 60 - 500000, 0, 1), `Interest = ${(emi * 60 - 500000).toFixed(2)}`);
      assert('No divide-by-zero error', isFinite(emi) && !isNaN(emi), `EMI is finite: ${isFinite(emi)}`);

      const rows = generateAmortization(500000, 0, 60, emi);
      assert('All months have 0 interest', rows.every(r => approx(r.interest, 0, 0.01)),
        `First month interest = ${rows[0].interest.toFixed(4)}`);
      assert('Equal principal each month', approx(rows[0].principal, rows[30].principal, 1),
        `Month 1 principal = ${rows[0].principal.toFixed(2)}, Month 31 = ${rows[30].principal.toFixed(2)}`);
    }

    // TEST 4: High Interest Case
    section('TEST 4: High Interest (₹2L, 36%, 2yr)');
    {
      const emi = calcEMI(200000, 36, 24);
      const total = emi * 24;
      const interest = total - 200000;
      assert('EMI is calculable (no overflow)', isFinite(emi) && emi > 0, `EMI = ${formatCurrency(emi)}`);
      assert('Interest is substantial (>40% of principal)', interest > 80000,
        `Interest = ${formatCurrency(interest)} (${(interest/200000*100).toFixed(1)}% of principal)`);

      const rows = generateAmortization(200000, 36, 24, emi);
      assert('All rows have valid values (no NaN)', rows.every(r => isFinite(r.opening) && isFinite(r.closing)),
        'All values finite');
      assert('Last month closes at 0', rows[23].closing === 0, `Closing = ${rows[23].closing.toFixed(4)}`);
    }

    // TEST 5: Very Short Tenure
    section('TEST 5: Very Short Tenure (₹1L, 12%, 3 months)');
    {
      const emi = calcEMI(100000, 12, 3);
      assert('EMI is large', emi > 33000, `EMI = ${formatCurrency(emi)} (${emi.toFixed(2)})`);
      assert('Small interest component', (emi * 3 - 100000) < 5000,
        `Total interest = ${formatCurrency(emi * 3 - 100000)}`);

      const rows = generateAmortization(100000, 12, 3, emi);
      assert('Table has exactly 3 rows', rows.length === 3, `Rows = ${rows.length}`);
      assert('Last month closes at 0', rows[2].closing === 0, `Closing = ${rows[2].closing.toFixed(4)}`);
    }

    // TEST 6: Very Long Tenure
    section('TEST 6: Very Long Tenure (₹50L, 8%, 30yr)');
    {
      const emi = calcEMI(5000000, 8, 360);
      const total = emi * 360;
      const interest = total - 5000000;
      assert('EMI is moderate', emi > 30000 && emi < 50000, `EMI = ${formatCurrency(emi)}`);
      assert('Interest ≈ 2x principal', interest >= 7000000 && interest <= 9000000,
        `Interest = ${formatCurrency(interest)} vs Principal ₹50,00,000`);

      const t0 = performance.now();
      const rows = generateAmortization(5000000, 8, 360, emi);
      const t1 = performance.now();
      assert('Table has 360 rows', rows.length === 360, `Rows = ${rows.length}`);
      assert('Performance: < 50ms to generate', (t1 - t0) < 50,
        `Time = ${(t1 - t0).toFixed(2)}ms`);
      assert('Last month closes at 0', rows[359].closing === 0, `Closing = ${rows[359].closing.toFixed(4)}`);
    }

    // TEST 7: Monthly vs Yearly rate validation
    section('TEST 7: Monthly Rate Validation (₹10L, 12%, 1yr)');
    {
      const emi = calcEMI(1000000, 12, 12);
      assert('EMI ≈ ₹88,849', approx(emi, 88849, 5), `EMI = ${emi.toFixed(2)}`);
      // Verify r = 12/12/100 = 0.01 = 1% monthly
      const r = 12 / 12 / 100;
      assert('Monthly rate = 1%', r === 0.01, `r = ${r}`);
    }

    // TEST 8: Amortization Table Validation
    section('TEST 8: Amortization Totals (₹3L, 10%, 1yr)');
    {
      const emi = calcEMI(300000, 10, 12);
      const rows = generateAmortization(300000, 10, 12, emi);
      const totalPrincipal = rows.reduce((s, r) => s + r.principal, 0);
      const totalInterest = rows.reduce((s, r) => s + r.interest, 0);
      assert('Total principal paid = ₹3,00,000', approx(totalPrincipal, 300000, 1),
        `Total principal = ${totalPrincipal.toFixed(2)}`);
      assert('Total interest = sum of all interest rows', approx(totalInterest, emi * 12 - 300000, 1),
        `Sum of interest rows = ${totalInterest.toFixed(2)}, Expected = ${(emi * 12 - 300000).toFixed(2)}`);
      assert('Last row closing balance = 0', rows[11].closing === 0,
        `Closing = ${rows[11].closing.toFixed(4)}`);
      assert('No negative balances', rows.every(r => r.closing >= 0),
        'All closing balances ≥ 0');
    }

    // TEST 9: Rounding Edge Case
    section('TEST 9: Rounding Edge Case (₹1,23,456, 7.75%, 17 months)');
    {
      const emi = calcEMI(123456, 7.75, 17);
      assert('EMI is accurate (not NaN)', isFinite(emi) && emi > 0, `EMI = ${emi.toFixed(4)}`);

      const rows = generateAmortization(123456, 7.75, 17, emi);
      assert('Final balance = 0', rows[16].closing === 0,
        `Closing balance = ${rows[16].closing.toFixed(6)}`);
      assert('No negative balances anywhere', rows.every(r => r.closing >= 0 && r.principal >= 0),
        'All values non-negative');
      assert('Total principal ≈ ₹1,23,456', approx(rows.reduce((s, r) => s + r.principal, 0), 123456, 1),
        `Total principal = ${rows.reduce((s, r) => s + r.principal, 0).toFixed(2)}`);
    }

    // TEST 10: Invalid Input Cases
    section('TEST 10: Invalid Input Validation');
    {
      assert('Negative loan → error', validateInputs(-100000, 10, 12) !== null,
        `Result: "${validateInputs(-100000, 10, 12)}"`);
      assert('Interest > 100% → error', validateInputs(100000, 150, 12) !== null,
        `Result: "${validateInputs(100000, 150, 12)}"`);
      assert('Tenure = 0 → error', validateInputs(100000, 10, 0) !== null,
        `Result: "${validateInputs(100000, 10, 0)}"`);
      assert('Negative interest → error', validateInputs(100000, -5, 12) !== null,
        `Result: "${validateInputs(100000, -5, 12)}"`);
      assert('Loan = 0 → error', validateInputs(0, 10, 12) !== null,
        `Result: "${validateInputs(0, 10, 12)}"`);
      assert('NaN tenure → error', validateInputs(100000, 10, NaN) !== null,
        `Result: "${validateInputs(100000, 10, NaN)}"`);
      assert('Valid inputs → no error', validateInputs(100000, 10, 12) === null,
        `Result: ${validateInputs(100000, 10, 12)}`);
      assert('calcEMI with P=0 returns 0', calcEMI(0, 10, 12) === 0, `EMI = ${calcEMI(0, 10, 12)}`);
      assert('calcEMI with months=0 returns 0', calcEMI(100000, 10, 0) === 0, `EMI = ${calcEMI(100000, 10, 0)}`);
    }

    // ===== ADDITIONAL CUSTOM TEST CASES =====

    section('CUSTOM TEST A: Minimum Loan (₹10,000, 8%, 1yr)');
    {
      const emi = calcEMI(10000, 8, 12);
      assert('EMI is reasonable', emi > 800 && emi < 1000, `EMI = ${emi.toFixed(2)}`);
      const rows = generateAmortization(10000, 8, 12, emi);
      assert('Correct row count', rows.length === 12, `Rows = ${rows.length}`);
      assert('Final balance = 0', rows[11].closing === 0, `Closing = ${rows[11].closing}`);
    }

    section('CUSTOM TEST B: Very Large Loan (₹10 Crore, 9%, 25yr)');
    {
      const emi = calcEMI(100000000, 9, 300);
      assert('No overflow (EMI is finite)', isFinite(emi), `EMI = ${formatCurrency(emi)}`);
      assert('EMI > ₹8L', emi > 800000, `EMI = ${emi.toFixed(2)}`);
      const rows = generateAmortization(100000000, 9, 300, emi);
      assert('300 rows generated', rows.length === 300, `Rows = ${rows.length}`);
      assert('Final balance = 0', rows[299].closing === 0, `Closing = ${rows[299].closing}`);
    }

    section('CUSTOM TEST C: 1-month tenure');
    {
      const emi = calcEMI(100000, 12, 1);
      assert('EMI = loan + 1 month interest', approx(emi, 101000, 1), `EMI = ${emi.toFixed(2)}`);
      const rows = generateAmortization(100000, 12, 1, emi);
      assert('Only 1 row', rows.length === 1, `Rows = ${rows.length}`);
      assert('Closing = 0', rows[0].closing === 0, `Closing = ${rows[0].closing}`);
    }

    section('CUSTOM TEST D: Interest rate = 0.5% (very low)');
    {
      const emi = calcEMI(1000000, 0.5, 120);
      assert('EMI ≈ principal/months (very low interest)', emi > 8000 && emi < 9000,
        `EMI = ${emi.toFixed(2)}`);
      const total = emi * 120;
      assert('Total interest very small', (total - 1000000) < 30000,
        `Interest = ${formatCurrency(total - 1000000)}`);
    }

    section('CUSTOM TEST E: Amortization consistency (sum of principals = loan)');
    {
      // Test with multiple different loan configs
      const configs = [
        { P: 500000, r: 11, m: 60 },
        { P: 750000, r: 9.5, m: 84 },
        { P: 1500000, r: 7.25, m: 180 },
        { P: 250000, r: 15, m: 36 },
      ];
      for (const c of configs) {
        const emi = calcEMI(c.P, c.r, c.m);
        const rows = generateAmortization(c.P, c.r, c.m, emi);
        const totalP = rows.reduce((s, r) => s + r.principal, 0);
        assert(`₹${(c.P/100000).toFixed(1)}L@${c.r}%/${c.m}mo: principal sums to loan`,
          approx(totalP, c.P, 1),
          `Total principal = ${totalP.toFixed(2)} vs Loan = ${c.P}`);
      }
    }

    section('CUSTOM TEST F: EMI formula correctness cross-check');
    {
      // Manual calculation: P=100000, r=1%/mo (12% annual), n=12
      // EMI = 100000 * 0.01 * 1.01^12 / (1.01^12 - 1)
      const factor = Math.pow(1.01, 12);
      const expected = 100000 * 0.01 * factor / (factor - 1);
      const actual = calcEMI(100000, 12, 12);
      assert('Formula cross-check matches', approx(actual, expected, 0.01),
        `Expected = ${expected.toFixed(4)}, Got = ${actual.toFixed(4)}`);
    }

    // ===== Summary =====
    const summaryEl = document.getElementById('summary');
    const total = passed + failed;
    summaryEl.className = 'summary ' + (failed === 0 ? 'pass' : 'fail');
    summaryEl.textContent = `Results: ${passed}/${total} passed, ${failed} failed`;
  </script>
</body>
</html>
